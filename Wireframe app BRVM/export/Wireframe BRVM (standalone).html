  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

6248-cdcd-425b-9dad-4bf5b8363986\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"56361dac-251c-4de9-8464-f91c429886e0\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"563c5e86-4b2c-45b3-b86c-6a824ce013cb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a8e47108-53ad-43b1-81f0-580155fed5d6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --font-display: 'Barlow Condensed', 'Arial Narrow', sans-serif;\n  --font-body:    'Barlow', 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:    'JetBrains Mono', 'SF Mono', Menlo, monospace;\n}\n<\u002Fstyle>\n<style>/* BRVM Design System — Color tokens\n   Palette family: Nike-inspired monochrome (true black / true white) is the\n   PRIMARY system — buttons, nav, focus, links all stay black/white. Color\n   (orange/blue/green/amber) is reserved for functional/feature meaning only\n   (market gains/losses, alerts, category tags) and never used as \"the brand\n   color\" for actions — exactly like nike.com, which is monochrome with\n   color popping up only for specific product/feature callouts. */\n\n:root {\n  /* ---- Base neutrals (true black/white anchor, warm-neutral grays) ---- */\n  --gray-0:  #ffffff;\n  --gray-25: #f7f7f5;\n  --gray-50: #efefec;\n  --gray-100:#e2e2dd;\n  --gray-200:#c9c9c2;\n  --gray-300:#a8a89f;\n  --gray-400:#82827a;\n  --gray-500:#63635c;\n  --gray-600:#48483f;\n  --gray-700:#313129;\n  --gray-800:#1d1d17;\n  --gray-900:#111110;\n  --gray-950:#000000;\n\n  /* ---- Functional color: reserved strictly for alerts/warnings (amber)\n     and market gains/losses (green/red) below — the system otherwise stays\n     black/white/gray, like nike.com. No general-purpose \"brand accent\" hue. ---- */\n\n  /* ---- Semantic market colors ---- */\n  --market-up-500:   #17c964;\n  --market-up-700:   #0e8f47;\n  --market-up-tint:  #e3faec;\n  --market-down-500: #ef4444;\n  --market-down-700: #b91c1c;\n  --market-down-tint:#fdecec;\n  --alert-500:  #2f6b4f;\n  --alert-700:  #1f4a36;\n  --alert-tint: #e8f2ec;\n  --info-500:   #2f6fed;\n  --info-700:   #1d4bb0;\n  --info-tint:  #e8f0fe;\n\n  /* ---- Semantic aliases: surfaces (light — Nike-site-style white field) ---- */\n  --surface-app:      var(--gray-0);\n  --surface-canvas:    var(--gray-25);\n  --surface-card:      var(--gray-25);\n  --surface-card-raised: var(--gray-0);\n  --surface-inverse:   var(--gray-950);\n  --surface-overlay:   rgba(0,0,0,0.5);\n  --surface-sunken:    var(--gray-50);\n\n  /* ---- Semantic aliases: text ---- */\n  --text-primary:    var(--gray-950);\n  --text-secondary:  var(--gray-600);\n  --text-tertiary:   var(--gray-500);\n  --text-disabled:   var(--gray-300);\n  --text-inverse:    var(--gray-0);\n  --text-link:       var(--gray-950);\n  --text-link-hover: var(--gray-600);\n\n  /* ---- Semantic aliases: borders ---- */\n  --border-subtle:  rgba(0,0,0,0.08);\n  --border-default: rgba(0,0,0,0.14);\n  --border-strong:  rgba(0,0,0,0.28);\n  --border-on-light:rgba(0,0,0,0.12);\n  --border-focus:   var(--gray-950);\n\n  /* ---- Semantic aliases: brand/action (monochrome — no color in core actions) ---- */\n  --action-primary:        var(--gray-950);\n  --action-primary-hover:  var(--gray-800);\n  --action-primary-active: var(--gray-700);\n  --action-primary-text:   var(--gray-0);\n\n  --action-secondary:        var(--gray-0);\n  --action-secondary-hover:  var(--gray-50);\n  --action-secondary-active: var(--gray-100);\n  --action-secondary-text:   var(--gray-950);\n\n  --action-ghost-hover:  rgba(0,0,0,0.06);\n  --action-ghost-active: rgba(0,0,0,0.1);\n\n  --action-danger:       var(--market-down-500);\n  --action-danger-hover: #dc2626;\n\n  /* ---- Semantic states ---- */\n  --state-success-fg: var(--market-up-500);\n  --state-success-bg: rgba(23,201,100,0.12);\n  --state-error-fg:   var(--market-down-500);\n  --state-error-bg:   rgba(239,68,68,0.12);\n  --state-warning-fg: var(--alert-500);\n  --state-warning-bg: rgba(47,107,79,0.12);\n  --state-info-fg:    var(--info-500);\n  --state-info-bg:    rgba(47,111,237,0.12);\n}\n<\u002Fstyle>\n<style>/* BRVM Design System — Type scale\n   Display type is condensed + uppercase + tight tracking (the \"shout\").\n   Body type is neutral and generously leaded (the \"explain\"). */\n\n:root {\n  /* Base sizes */\n  --text-display-xl: 700 clamp(40px, 9vw, 64px)/0.94 var(--font-display);\n  --text-display-l:  800 40px/0.96 var(--font-display);\n  --text-display-m:  800 32px/1.0 var(--font-display);\n  --text-display-s:  700 24px/1.05 var(--font-display);\n\n  --text-title:      600 20px/1.2 var(--font-body);\n  --text-body-l:     400 17px/1.5 var(--font-body);\n  --text-body:       400 15px/1.5 var(--font-body);\n  --text-body-s:     400 13px/1.45 var(--font-body);\n  --text-caption:    500 11px/1.3 var(--font-body);\n  --text-label:      700 12px/1.1 var(--font-body);\n\n  --text-mono:       500 13px/1.5 var(--font-mono);\n  --text-mono-l:     600 20px/1.2 var(--font-mono);\n\n  /* Letter-spacing: condensed display runs tight/negative; labels get a\n     small POSITIVE track since they're uppercase and small. */\n  --tracking-display: -0.01em;\n  --tracking-body:     0;\n  --tracking-label:    0.06em;\n}\n<\u002Fstyle>\n<style>/* BRVM Design System — Spacing scale (4px base unit, athletic-brand generous gutters) */\n:root {\n  --space-0: 0px;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 32px;\n  --space-8: 40px;\n  --space-9: 48px;\n  --space-10: 64px;\n  --space-11: 80px;\n  --space-12: 96px;\n\n  --layout-gutter: var(--space-5);\n  --layout-max-width: 480px; /* mobile-first product */\n}\n<\u002Fstyle>\n<style>/* BRVM Design System — Radii & elevation\n   Motifs: hard-edged, minimal rounding (athletic/industrial), NOT bubbly.\n   Chips/pills get full rounding; cards and inputs stay tight-radius. */\n:root {\n  --radius-none: 0px;\n  --radius-s:  6px;\n  --radius-m:  10px;\n  --radius-l:  16px;\n  --radius-xl: 24px;\n  --radius-pill: 999px;\n\n  /* Elevation: dark UI, so shadows are mostly about separation, not drop-shadow drama.\n     Use a subtle outer glow + a hairline border rather than heavy blur. */\n  --shadow-none: none;\n  --shadow-s: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-m: 0 4px 16px rgba(0,0,0,0.45);\n  --shadow-l: 0 12px 32px rgba(0,0,0,0.55);\n\n  --border-width: 1px;\n\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 360ms; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* BRVM Design System — Webfonts\n   Nike-inspired athletic condensed display + a workhorse grotesque body face.\n   No local font binaries were provided, so these are sourced live from\n   Google Fonts (closest-match substitution — see readme.md \"Caveats\"). */\n\n/* vietnamese */\n@font-face {\n  font-family: 'Barlow';\n  font-style: i  url(\"563c5e86-4b2c-45b3-b86c-6a824ce013cb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a8e47108-53ad-43b1-81f0-580155fed5d6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --font-display: 'Barlow Condensed', 'Arial Narrow', sans-serif;\n  --font-body:    'Barlow', 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:    'JetBrains Mono', 'SF Mono', Menlo, monospace;\n}\n\n/* BRVM Design System — Color tokens\n   Palette family: Nike-inspired monochrome (true black / true white) is the\n   PRIMARY system — buttons, nav, focus, links all stay black/white. Color\n   (orange/blue/green/amber) is reserved for functional/feature meaning only\n   (market gains/losses, alerts, category tags) and never used as \"the brand\n   color\" for actions — exactly like nike.com, which is monochrome with\n   color popping up only for specific product/feature callouts. */\n\n:root {\n  /* ---- Base neutrals (true black/white anchor, warm-neutral grays) ---- */\n  --gray-0:  #ffffff;\n  --gray-25: #f7f7f5;\n  --gray-50: #efefec;\n  --gray-100:#e2e2dd;\n  --gray-200:#c9c9c2;\n  --gray-300:#a8a89f;\n  --gray-400:#82827a;\n  --gray-500:#63635c;\n  --gray-600:#48483f;\n  --gray-700:#313129;\n  --gray-800:#1d1d17;\n  --gray-900:#111110;\n  --gray-950:#000000;\n\n  /* ---- Functional color: reserved strictly for alerts/warnings (amber)\n     and market gains/losses (green/red) below — the system otherwise stays\n     black/white/gray, like nike.com. No general-purpose \"brand accent\" hue. ---- */\n\n  /* ---- Semantic market colors ---- */\n  --market-up-500:   #17c964;\n  --market-up-700:   #0e8f47;\n  --market-up-tint:  #e3faec;\n  --market-down-500: #ef4444;\n  --market-down-700: #b91c1c;\n  --market-down-tint:#fdecec;\n  --alert-500:  #2f6b4f;\n  --alert-700:  #1f4a36;\n  --alert-tint: #e8f2ec;\n  --info-500:   #2f6fed;\n  --info-700:   #1d4bb0;\n  --info-tint:  #e8f0fe;\n\n  /* ---- Semantic aliases: surfaces (light — Nike-site-style white field) ---- */\n  --surface-app:      var(--gray-0);\n  --surface-canvas:    var(--gray-25);\n  --surface-card:      var(--gray-25);\n  --surface-card-raised: var(--gray-0);\n  --surface-inverse:   var(--gray-950);\n  --surface-overlay:   rgba(0,0,0,0.5);\n  --surface-sunken:    var(--gray-50);\n\n  /* ---- Semantic aliases: text ---- */\n  --text-primary:    var(--gray-950);\n  --text-secondary:  var(--gray-600);\n  --text-tertiary:   var(--gray-500);\n  --text-disabled:   var(--gray-300);\n  --text-inverse:    var(--gray-0);\n  --text-link:       var(--gray-950);\n  --text-link-hover: var(--gray-600);\n\n  /* ---- Semantic aliases: borders ---- */\n  --border-subtle:  rgba(0,0,0,0.08);\n  --border-default: rgba(0,0,0,0.14);\n  --border-strong:  rgba(0,0,0,0.28);\n  --border-on-light:rgba(0,0,0,0.12);\n  --border-focus:   var(--gray-950);\n\n  /* ---- Semantic aliases: brand/action (monochrome — no color in core actions) ---- */\n  --action-primary:        var(--gray-950);\n  --action-primary-hover:  var(--gray-800);\n  --action-primary-active: var(--gray-700);\n  --action-primary-text:   var(--gray-0);\n\n  --action-secondary:        var(--gray-0);\n  --action-secondary-hover:  var(--gray-50);\n  --action-secondary-active: var(--gray-100);\n  --action-secondary-text:   var(--gray-950);\n\n  --action-ghost-hover:  rgba(0,0,0,0.06);\n  --action-ghost-active: rgba(0,0,0,0.1);\n\n  --action-danger:       var(--market-down-500);\n  --action-danger-hover: #dc2626;\n\n  /* ---- Semantic states ---- */\n  --state-success-fg: var(--market-up-500);\n  --state-success-bg: rgba(23,201,100,0.12);\n  --state-error-fg:   var(--market-down-500);\n  --state-error-bg:   rgba(239,68,68,0.12);\n  --state-warning-fg: var(--alert-500);\n  --state-warning-bg: rgba(47,107,79,0.12);\n  --state-info-fg:    var(--info-500);\n  --state-info-bg:    rgba(47,111,237,0.12);\n}\n\n/* BRVM Design System — Type scale\n   Display type is condensed + uppercase + tight tracking (the \"shout\").\n   Body type is neutral and generously leaded (the \"explain\"). */\n\n:root {\n  /* Base sizes */\n  --text-display-xl: 700 clamp(40px, 9vw, 64px)/0.94 var(--font-display);\n  --text-display-l:  800 40px/0.96 var(--font-display);\n  --text-display-m:  800 32px/1.0 var(--font-display);\n  --text-display-s:  700 24px/1.05 var(--font-display);\n\n  --text-title:      600 20px/1.2 var(--font-body);\n  --text-body-l:     400 17px/1.5 var(--font-body);\n  --text-body:       400 15px/1.5 var(--font-body);\n  --text-body-s:     400 13px/1.45 var(--font-body);\n  --text-caption:    500 11px/1.3 var(--font-body);\n  --text-label:      700 12px/1.1 var(--font-body);\n\n  --text-mono:       500 13px/1.5 var(--font-mono);\n  --text-mono-l:     600 20px/1.2 var(--font-mono);\n\n  /* Letter-spacing: condensed display runs tight/negative; labels get a\n     small POSITIVE track since they're uppercase and small. */\n  --tracking-display: -0.01em;\n  --tracking-body:     0;\n  --tracking-label:    0.06em;\n}\n\n/* BRVM Design System — Spacing scale (4px base unit, athletic-brand generous gutters) */\n:root {\n  --space-0: 0px;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 32px;\n  --space-8: 40px;\n  --space-9: 48px;\n  --space-10: 64px;\n  --space-11: 80px;\n  --space-12: 96px;\n\n  --layout-gutter: var(--space-5);\n  --layout-max-width: 480px; /* mobile-first product */\n}\n\n/* BRVM Design System — Radii & elevation\n   Motifs: hard-edged, minimal rounding (athletic/industrial), NOT bubbly.\n   Chips/pills get full rounding; cards and inputs stay tight-radius. */\n:root {\n  --radius-none: 0px;\n  --radius-s:  6px;\n  --radius-m:  10px;\n  --radius-l:  16px;\n  --radius-xl: 24px;\n  --radius-pill: 999px;\n\n  /* Elevation: dark UI, so shadows are mostly about separation, not drop-shadow drama.\n     Use a subtle outer glow + a hairline border rather than heavy blur. */\n  --shadow-none: none;\n  --shadow-s: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-m: 0 4px 16px rgba(0,0,0,0.45);\n  --shadow-l: 0 12px 32px rgba(0,0,0,0.55);\n\n  --border-width: 1px;\n\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 360ms; /* @kind other */\n}\n\n\n* { box-sizing: border-box; }\nbody {\n  background: var(--surface-app);\n  color: var(--text-primary);\n  font: var(--text-body);\n  margin: 0;\n}\na { color: var(--text-link); }\na:hover { color: var(--text-link-hover); }\n<\u002Fstyle>\n<script src=\"c66c23c7-2c73-4324-a15b-9791a4c945de\"><\u002Fscript>\n<script src=\"7e707380-a336-437a-9325-36d5db5f0fd5\"><\u002Fscript>\n<style>\n  body{margin:0;background:#f0eee9;font-family:var(--font-body,system-ui,sans-serif)}\n  .dv-turn{padding:40px 44px 60px;scroll-margin-top:16px}\n  .dv-thd{display:flex;align-items:baseline;gap:10px;margin:0 0 22px}\n  .dv-tid{font:600 10px ui-monospace,Menlo,monospace;padding:3px 7px;background:#1a1a1a;color:#fff;border-radius:4px;text-decoration:none}\n  .dv-tname{font:600 13px/1.2 system-ui,sans-serif;color:#1a1a1a}\n  .dv-opts{display:flex;flex-wrap:wrap;gap:32px;align-items:flex-start}\n  .dv-opt{flex:none;display:flex;flex-direction:column;gap:9px;scroll-margin-top:16px}\n  .dv-oid{font:600 10.5px ui-monospace,Menlo,monospace;padding:3px 7px;background:rgba(0,0,0,.08);color:#1a1a1a;border-radius:5px;t
